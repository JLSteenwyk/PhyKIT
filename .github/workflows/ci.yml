name: CI
on: push
jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@master
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@master
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        # Install setuptools first (required for Python 3.13)
        pip install setuptools
        pip install -r requirements.txt
        # make phykit CLI available for tests
        make install
        # install test dependencies
        pip install -r tests/requirements.txt
    - name: Generate coverage report
      if: ${{ matrix.python-version == '3.10' }}
      run: |
        make test.coverage
    - name: Run test suite
      if: ${{ matrix.python-version != '3.10' }}
      run: |
        make test
    - name: Upload unit test coverage to Codecov
      if: ${{ matrix.python-version == '3.10' }}
      uses: codecov/codecov-action@v1.0.7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./unit.coverage.xml
        flags: unit
        env_vars: PYTHON
        name: codecov-unit
        fail_ci_if_error: false
    - name: Upload integration test coverage to Codecov
      if: ${{ matrix.python-version == '3.10' }}
      uses: codecov/codecov-action@v1.0.7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./integration.coverage.xml
        flags: integration
        env_vars: PYTHON
        name: codecov-integration
        fail_ci_if_error: false

  docs:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master
        with:
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r tests/requirements.txt
          python -m pip install build sphinx sphinx-rtd-theme
          python -m pip install .
      - name: Check generated documentation
        run: python scripts/build_docs_catalog.py --check
      - name: Check documentation contracts and retrieval benchmark
        run: |
          python -m pytest \
            tests/unit/test_cli_registry.py \
            tests/unit/test_docs_category_coverage.py \
            tests/unit/test_docs_navigation.py \
            tests/unit/test_llm_docs.py \
            tests/unit/test_tutorial_docs.py
      - name: Build documentation with strict references
        run: sphinx-build -q -n -W --keep-going -b html docs docs/_build/html
      - name: Build wheel and run portable tutorial smoke tests
        run: |
          python -m build --wheel
          python scripts/check_wheel_entry_points.py dist/*.whl
          python -m venv tutorial-wheel
          tutorial-wheel/bin/python -m pip install --upgrade pip
          tutorial-wheel/bin/python -m pip install dist/*.whl
          python scripts/check_wheel_entry_points.py dist/*.whl \
            --smoke-python tutorial-wheel/bin/python
          python scripts/smoke_tutorials.py --python tutorial-wheel/bin/python
      - name: Deploy
        if: ${{ github.ref == 'refs/heads/master' }}
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages
          FOLDER: docs/_build/html
